name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set variables
        id: vars
        run: |
          ADDON_NAME="MidnightProfTracker"
          TAG="${GITHUB_REF_NAME}"
          echo "addon_name=${ADDON_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "zip_name=${ADDON_NAME}-${TAG}.zip" >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          ADDON_NAME="${{ steps.vars.outputs.addon_name }}"
          ZIP_NAME="${{ steps.vars.outputs.zip_name }}"

          # Stage addon files under a folder named after the addon
          mkdir -p "/tmp/pkg/${ADDON_NAME}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.pkgmeta' \
            . "/tmp/pkg/${ADDON_NAME}/"

          # Create the zip so the addon folder sits at the archive root
          cd /tmp/pkg
          zip -r "${GITHUB_WORKSPACE}/${ZIP_NAME}" "${ADDON_NAME}"

      - name: Upload to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_API_TOKEN }}
          project_id: 1508602
          game_endpoint: wow
          file_path: ${{ steps.vars.outputs.zip_name }}
          display_name: ${{ steps.vars.outputs.tag }}
          game_versions: "Mainline"
          release_type: release
          changelog: "See the GitHub release for full changelog."

      - name: Upload to Wago.io
        run: |
          curl -sS --fail \
            -H "Authorization: Bearer ${{ secrets.WAGO_API_TOKEN }}" \
            -F "file=@${{ steps.vars.outputs.zip_name }}" \
            -F "stability=stable" \
            -F "label=${{ steps.vars.outputs.tag }}" \
            "https://addons.wago.io/api/addons/nKW3JoKE/version"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vars.outputs.zip_name }}
          generate_release_notes: true
